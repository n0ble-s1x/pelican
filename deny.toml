[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# `cargo audit` (run separately by scripts/check.sh) emits a soft warning for
# RUSTSEC-2024-0436 (paste, unmaintained, transitive via eframe → wgpu →
# metal → paste). It is not a vulnerability — no exploit path. Revisit when
# upstream wgpu replaces paste.

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    # Font licenses required by epaint_default_fonts (default eframe fonts).
    # Both are permissive free font licenses; OFL-1.1 is OSI-approved, UFL-1.0
    # is the Ubuntu Font License (no SPDX id, referenced via LicenseRef).
    "OFL-1.1",
    "LicenseRef-UFL-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
