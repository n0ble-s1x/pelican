version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    # 48h cooldown: don't open a PR for any release younger than 2 days. Gives
    # the world time to flag a poisoned release before it shows up here. We
    # never auto-merge regardless; this just avoids surfacing risky deltas
    # the moment they hit crates.io.
    cooldown:
      default-days: 2
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
