# Pelican — Flathub manifest
#
# Test build locally:
#   flatpak install flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08 org.freedesktop.Sdk.Extension.rust-stable//23.08
#   flatpak-builder --user --install build/ packaging/flatpak/com.krypteia.Pelican.yaml --force-clean
#   flatpak run com.krypteia.Pelican
#
# Submit to Flathub: https://docs.flathub.org/docs/for-app-authors/submission

app-id: com.krypteia.Pelican
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: pelican

finish-args:
  # Wayland + X11 fallback
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc

  # Direct USB access for the Garmin watch (vendor 091e)
  - --device=usb=091e:*

  # Read access to common music locations + user-chosen folders via the file
  # portal. We don't need write access to user dirs — only USB writes.
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-download:ro
  - --filesystem=host:ro

  # No network. Pelican is fully local. Locked down here so a compromised
  # dependency can't phone home from inside the sandbox.
  # (Flathub will warn that we don't request --share=network — that's by design.)

modules:
  - name: ffmpeg
    config-opts:
      - --disable-doc
      - --disable-debug
      - --disable-network
      - --disable-static
      - --enable-shared
      - --enable-libmp3lame
    cleanup:
      - /share/ffmpeg/examples
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-7.1.tar.xz
        sha256: 40973d44970dbc83ef302b0609f2e74982be2d85916dd2ee7472d30678a7abe6

  - name: pelican
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/pelican/cargo
    build-commands:
      - cargo build --release --all-features --offline
      - install -Dm755 target/release/pelican /app/bin/pelican
      - install -Dm644 packaging/desktop/pelican.desktop /app/share/applications/com.krypteia.Pelican.desktop
      - install -Dm644 packaging/flatpak/com.krypteia.Pelican.metainfo.xml /app/share/metainfo/com.krypteia.Pelican.metainfo.xml
      - install -Dm644 packaging/flatpak/com.krypteia.Pelican.svg /app/share/icons/hicolor/scalable/apps/com.krypteia.Pelican.svg
    sources:
      - type: dir
        path: ../..
      # Vendored cargo deps for offline builds — generated by
      # `cargo vendor` before submission. Path placeholder; populated at
      # release time per Flathub's reproducibility requirements.
      # - type: file
      #   path: cargo-sources.json
